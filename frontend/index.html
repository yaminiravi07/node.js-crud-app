<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Node.js CRUD Dashboard</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;
    }

    body{
      background:linear-gradient(135deg,#141e30,#243b55);
      min-height:100vh;
      color:white;
      transition:0.3s;
    }

    body.light{
      background:#f4f6f9;
      color:#111;
    }

    .container{
      width:95%;
      max-width:1000px;
      margin:40px auto;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
    }

    .header h1{
      font-size:32px;
      font-weight:700;
    }

    .theme-btn{
      background:#ffffff22;
      border:none;
      color:white;
      padding:10px 18px;
      border-radius:10px;
      cursor:pointer;
      font-size:15px;
      backdrop-filter:blur(10px);
    }

    body.light .theme-btn{
      background:#111;
      color:white;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:20px;
      margin-bottom:25px;
    }

    .card{
      background:rgba(255,255,255,0.1);
      padding:20px;
      border-radius:18px;
      backdrop-filter:blur(10px);
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
      transition:0.3s;
    }

    body.light .card{
      background:white;
      color:#111;
    }

    .card h3{
      font-size:15px;
      opacity:0.8;
      margin-bottom:10px;
    }

    .card p{
      font-size:30px;
      font-weight:bold;
    }

    .main-panel{
      background:rgba(255,255,255,0.1);
      border-radius:20px;
      padding:25px;
      backdrop-filter:blur(10px);
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    body.light .main-panel{
      background:white;
      color:#111;
    }

    .top-controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    input{
      flex:1;
      min-width:180px;
      padding:14px;
      border:none;
      border-radius:10px;
      outline:none;
      font-size:15px;
    }

    .add-btn{
      background:#00c853;
      color:white;
      border:none;
      padding:14px 22px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }

    .add-btn:hover{
      transform:scale(1.05);
    }

    .items{
      margin-top:20px;
      display:grid;
      gap:15px;
    }

    .item{
      background:rgba(255,255,255,0.08);
      padding:18px;
      border-radius:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      transition:0.3s;
    }

    body.light .item{
      background:#f1f1f1;
    }

    .item:hover{
      transform:translateY(-2px);
    }

    .item-info h2{
      font-size:18px;
      margin-bottom:5px;
    }

    .item-info p{
      opacity:0.8;
      font-size:14px;
    }

    .actions{
      display:flex;
      gap:10px;
    }

    .edit-btn{
      background:#2196f3;
      color:white;
      border:none;
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
    }

    .delete-btn{
      background:#f44336;
      color:white;
      border:none;
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
    }

    .empty{
      text-align:center;
      opacity:0.7;
      margin-top:20px;
    }

    @media(max-width:700px){

      .header{
        flex-direction:column;
        gap:15px;
      }

      .item{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
      }

      .actions{
        width:100%;
      }

      .actions button{
        flex:1;
      }

    }

  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>🚀 Node.js CRUD Dashboard</h1>

    <button class="theme-btn" onclick="toggleTheme()">
      🌙 Toggle Theme
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-grid">

    <div class="card">
      <h3>Total Items</h3>
      <p id="totalItems">0</p>
    </div>

    <div class="card">
      <h3>Backend</h3>
      <p>Node.js</p>
    </div>

    <div class="card">
      <h3>Database</h3>
      <p>PostgreSQL</p>
    </div>

  </div>

  <!-- Main Panel -->
  <div class="main-panel">

    <div class="top-controls">

      <input
        type="text"
        id="search"
        placeholder="🔍 Search items..."
        onkeyup="filterItems()"
      />

      <input
        type="text"
        id="name"
        placeholder="Enter name"
      />

      <input
        type="text"
        id="desc"
        placeholder="Enter description"
      />

      <button class="add-btn" onclick="addItem()">
        Add
      </button>

    </div>

    <div class="items" id="itemsContainer"></div>

    <div class="empty" id="emptyMessage">
      No items found
    </div>

  </div>

</div>

<script>

const API = "/items";

let items = [];
let editId = null;

// Theme Toggle
function toggleTheme(){
  document.body.classList.toggle("light");
}

// Fetch Items
async function fetchItems(){

  const res = await fetch(API);

  items = await res.json();

  renderItems(items);
}

// Render Items
function renderItems(data){

  const container =
    document.getElementById("itemsContainer");

  const empty =
    document.getElementById("emptyMessage");

  container.innerHTML = "";

  document.getElementById("totalItems").innerText =
    data.length;

  if(data.length === 0){
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";

  data.forEach(item => {

    const div = document.createElement("div");

    div.className = "item";

    div.innerHTML = `
      <div class="item-info">
        <h2>${item.name}</h2>
        <p>${item.description}</p>
      </div>

      <div class="actions">
        <button class="edit-btn">
          Edit
        </button>

        <button class="delete-btn">
          Delete
        </button>
      </div>
    `;

    div.querySelector(".edit-btn")
      .onclick = () => editItem(item);

    div.querySelector(".delete-btn")
      .onclick = () => deleteItem(item.id);

    container.appendChild(div);

  });

}

// Add / Update
async function addItem(){

  const name =
    document.getElementById("name").value.trim();

  const description =
    document.getElementById("desc").value.trim();

  if(!name || !description){
    alert("Fill all fields");
    return;
  }

  if(editId){

    await fetch(`${API}/${editId}`,{
      method:"PUT",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name,
        description
      })
    });

    editId = null;

  }else{

    await fetch(API,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        name,
        description
      })
    });

  }

  document.getElementById("name").value = "";
  document.getElementById("desc").value = "";

  fetchItems();
}

// Edit
function editItem(item){

  document.getElementById("name").value =
    item.name;

  document.getElementById("desc").value =
    item.description;

  editId = item.id;
}

// Delete
async function deleteItem(id){

  await fetch(`${API}/${id}`,{
    method:"DELETE"
  });

  fetchItems();
}

// Search Filter
function filterItems(){

  const query =
    document.getElementById("search")
    .value
    .toLowerCase();

  const filtered = items.filter(item =>
    item.name.toLowerCase().includes(query) ||
    item.description.toLowerCase().includes(query)
  );

  renderItems(filtered);
}

fetchItems();

</script>

</body>
</html>
